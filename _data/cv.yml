    Selected Publications:
      - title: Empirical measures and strong laws of large numbers in categorical probability
        authors:
          - Tobias Fritz
          - Tomáš Gonda
          - Lorenzin, Antonio
          - Perrone, Paolo
          - Mohammed, Areeb Shah
        publisher: "preprint arxiv:2503.21576"
        releaseDate: 2025
        url: https://arxiv.org/abs/2503.21576
        summary: We introduce axioms for empirical sampling morphisms, which are abstract notions of empirical measures within the framework of categorical probability. Using these, we prove abstract versions of the de Finetti theorem, the Glivenko–Cantelli theorem, and the strong law of large numbers, and show that classical results are recovered via the category of partial Markov kernels.
        
      - title: De Finetti's theorem in categorical probability
        authors:
          - Tobias Fritz
          - Tomáš Gonda
          - Perrone, Paolo
        publisher: "Journal of Stochastic Analysis"
        releaseDate: 2021
        url: https://repository.lsu.edu/josa/vol2/iss4/6/
        summary: A novel proof of de Finetti's Theorem characterizing permutation-invariant probability measures of infinite sequences of variables. The proof is phrased in the language of Markov categories, which provide an abstract categorical framework for probability and information flow. The diagrammatic and modular nature of the arguments makes the proof intuitive and easy to follow. 
        
      - title: "Epistemic horizons from deterministic laws: Lessons from a nomic toy theory"
        authors:
          - Johannes Fankhauser 
          - Tomáš Gonda
          - Gemma De Les Coves
        publisher: "Synthese"
        releaseDate: 2025
        url: https://link.springer.com/article/10.1007/s11229-024-04852-0
        summary: A study of what embedded observers can learn about the rest of the world made up of classical particles. We show that, in spite of deterministic physical laws, they face an epistemic horizon — properties such as position and momentum cannot be known simultaneously.
        
      - title: A framework for universality in physics, computer science, and beyond
        authors:
          - Tomáš Gonda
          - Tobias Reinhart
          - Sebastian Stengele
          - Gemma De Les Coves
        publisher: "Compositionality"
        releaseDate: 2024
        url: https://compositionality.episciences.org/14134
        summary: First steps towards an abstract theory of universality, generalizing universal Turing machines, universal spin systems, completeness for complexity classes,and much more.
        
      - title: Monotones in general resource theories
        authors:
          - Tomáš Gonda
          - Robert W. Spekkens
        publisher: "Compositionality"
        releaseDate: 2023
        url: https://compositionality.episciences.org/13526
        summary: Resource theories offer an abstract framework for comparing resources for all kinds of tasks. We provide a general theory for quantifying the cost and yield of a resource, generalizing a plethora of known constructions.

